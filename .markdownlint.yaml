---
# Repo-wide markdownlint configuration (prose/docs-friendly).
# CI's `build` job runs `trunk check --ci`, linting modified Markdown with
# markdownlint. With no config, markdownlint applies strict defaults (80-col
# line length, etc.) that long-form and tabular docs under docs/ cannot meet
# without abandoning tables. This keeps the gate active for real defects while
# disabling the rules that fight hand-authored documentation. Mirrors the
# intent of .prettierignore exempting docs/ ("managed by markdownlint").
default: true
MD013: false  # line-length: tables and prose exceed 80 cols
MD033: false  # no-inline-html: docs use <details>, <sup>, <br>
MD041: false  # first-line-h1: some docs lead with metadata
MD060: false  # table-column-style: hand-written pipe spacing varies
